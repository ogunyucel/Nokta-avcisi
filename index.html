<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nokta Avcısı 🎯</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body { 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; 
            background: linear-gradient(135deg, #8e44ad 0%, #3498db 100%); 
        }
        
        .container { 
            background: rgba(255, 255, 255, 0.95); 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.4); 
            text-align: center; 
            width: 90%; 
            max-width: 420px; 
            position: relative; 
        }

        h1 { color: #2c3e50; margin-bottom: 10px; font-size: 38px;}
        p { color: #34495e; font-size: 22px; font-weight: 600; margin-bottom: 25px; }
        
        /* Ana Yönlendirme Butonu (matfabe/oyunlar için) */
        .btn-redirect-main {
            position: absolute; top: 15px; right: 15px; width: 35px; height: 35px;
            background-color: #ff4d4d; color: white; text-decoration: none; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold;
            transition: 0.3s; box-shadow: 0 2px 5px rgba(0,0,0,0.2); z-index: 100;
        }
        .btn-redirect-main:hover { background-color: #ff0000; transform: scale(1.1); }

        /* Yuvarlak Kapatma Butonu (Oyun içi ekranlar için) */
        .btn-close {
            position: absolute; top: 15px; right: 15px; width: 35px; height: 35px;
            background-color: #ff4d4d; color: white; border: none; border-radius: 50%;
            cursor: pointer; font-size: 20px; font-weight: bold; display: flex;
            align-items: center; justify-content: center; transition: 0.3s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2); padding: 0; line-height: 1; z-index: 100; 
        }
        .btn-close:hover { background-color: #ff0000; transform: scale(1.1); }
        
        /* Seviye Grid Yapısı */
        .level-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px;}
        .btn-level { 
            background-color: #34495e; color: white; padding: 15px 0; font-size: 26px; margin: 0;
            border: none; border-radius: 10px; cursor: pointer; transition: 0.3s; font-weight: bold;
        }
        .btn-level:hover { background-color: #2c3e50; transform: translateY(-3px); box-shadow: 0 5px 10px rgba(0,0,0,0.15);}
        
        .hidden { display: none !important; }

        /* SKOR TABLOSU - Tıklanabilir */
        #score-board { 
            margin-bottom: 15px; margin-top: 35px; background: #f8f9fa; padding: 15px; 
            padding-right: 50px; border-radius: 15px; display: flex; flex-direction: column;
            gap: 8px; position: relative; border: 1px solid #ddd;
            cursor: pointer; transition: background-color 0.2s ease;
        }
        #score-board:hover {
            background-color: #e9ecef; 
        }
        #score-board:hover .btn-inspect {
            color: #3498db; 
        }
        
        .main-stats { font-size: 18px; font-weight: bold; color: #2c3e50; }
        .sub-stats { font-size: 15px; font-weight: bold; display: flex; justify-content: center; gap: 8px; align-items: center;}
        
        .stat-correct { color: #27ae60; }
        .stat-wrong { color: #e74c3c; }
        .stat-divider { color: #bdc3c7; }

        .btn-inspect {
            position: absolute; top: 50%; right: 10px; transform: translateY(-50%);
            display: flex; flex-direction: column;
            align-items: center; font-size: 12px; font-weight: bold; color: #2c3e50; transition: 0.2s; padding: 0;
        }
        .btn-inspect span { font-size: 24px; margin-bottom: 2px; }

        /* YENİ EKLENEN: Soru Yazıları Stili */
        .question-text {
            font-size: 24px; font-weight: bold; color: #2c3e50;
            margin: 5px 0; text-align: center;
        }
        .question-text .red-qm { color: #e74c3c; font-weight: 900; }
        .bottom-equation { font-size: 28px; margin-top: -10px; margin-bottom: 15px; }

        /* İNCELEME EKRANI TABLOSU */
        .table-list {
            display: flex; justify-content: space-between; gap: 15px;
            margin-top: 15px; padding: 15px; background: #f8f9fa;
            border-radius: 15px; border: 2px solid #ecf0f1;
        }
        .table-column {
            flex: 1; display: flex; flex-direction: column; gap: 8px;
        }
        .table-row { 
            font-size: 17px; 
            font-weight: bold; padding-bottom: 5px; border-bottom: 1px dashed #ddd; 
            text-align: left; white-space: nowrap;
        }
        .row-correct { color: #27ae60; }
        .row-wrong { color: #e74c3c; }
        .row-unanswered { color: #7f8c8d; }

        /* YANLIŞLARA ÇALIŞ BUTONU */
        .btn-mistakes {
            background-color: #e67e22; color: white; padding: 15px; font-size: 20px;
            border: none; border-radius: 10px; cursor: pointer; font-weight: bold;
            width: 100%; margin-top: 15px; transition: 0.3s;
        }
        .btn-mistakes:hover { background-color: #d35400; transform: translateY(-2px); box-shadow: 0 4px 10px rgba(230, 126, 34, 0.4); }

        /* SİMETRİK MATRİS VE PARANTEZ TASARIMI */
        .matrix-wrapper {
            display: flex; justify-content: center; align-items: center; 
            margin: 15px 0 25px 0; padding-right: 55px; padding-left: 55px;  
            padding-bottom: 45px; min-height: 150px; max-width: 100%; box-sizing: border-box; 
        }
        .matrix-container {
            position: relative; display: inline-block;
        }

        #dot-container {
            display: grid; justify-content: center; justify-items: center; gap: 6px 8px;
        }
        
        .dot {
            width: 18px; height: 18px; background-color: #f1c40f; 
            border-radius: 50%; box-shadow: 0 3px 6px rgba(0,0,0,0.15); border: 2px solid #f39c12;
            animation: popIn 0.3s ease-out forwards; transform: scale(0);
        }

        .bracket-right {
            position: absolute; right: -15px; top: 0; bottom: 0; 
            border-top: 2px solid #34495e; border-bottom: 2px solid #34495e; border-right: 2px solid #34495e;
            width: 8px; display: flex; align-items: center;
        }
        #row-label { 
            position: absolute; left: 12px; font-weight: bold; font-size: 15px; 
            color: #34495e; white-space: nowrap; animation: fadeIn 0.5s ease-out forwards; opacity: 0;
        }

        .bracket-bottom {
            position: absolute; bottom: -15px; left: 0; right: 0; 
            border-left: 2px solid #34495e; border-right: 2px solid #34495e; border-bottom: 2px solid #34495e;
            height: 8px; display: flex; justify-content: center;
        }
        #col-label { 
            position: absolute; top: 12px; font-weight: bold; font-size: 15px;
            color: #34495e; white-space: nowrap; animation: fadeIn 0.5s ease-out forwards; opacity: 0;
        }

        @keyframes popIn { to { transform: scale(1); } }
        @keyframes fadeIn { to { opacity: 1; } }

        /* CEVAP ŞIKLARI */
        .options { display: flex; justify-content: space-between; gap: 10px; margin-top: 5px; width: 100%;}
        .btn-option { 
            background-color: #f1f2f6; color: #2c3e50; border: 3px solid #ced4da; 
            flex: 1; margin: 0; padding: 10px 2px; height: 70px; font-size: 28px; font-weight: bold; border-radius: 15px;
            cursor: pointer; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); white-space: nowrap;
        }
        .btn-option:hover { background-color: #e2e6ea; transform: translateY(-3px) scale(1.02); box-shadow: 0 6px 12px rgba(0,0,0,0.15); }
        
        .correct { background-color: #2ecc71 !important; color: white !important; border-color: #27ae60 !important; transform: scale(1.02); }
        .wrong { background-color: #e74c3c !important; color: white !important; border-color: #c0392b !important; transform: scale(0.98); }

        #message { height: 30px; font-weight: bold; margin-top: 15px; font-size: 20px; transition: 0.3s; color: #555; }
    </style>
</head>
<body>

<!-- 1. SEVİYE EKRANI -->
<div id="level-screen" class="container">
    <!-- Ana Yönlendirme Butonu -->
    <a href="https://matfabe.com/oyunlar/" class="btn-redirect-main">×</a>
    
    <h1>🎯 Nokta Avcısı</h1>
    <p>Seviyeni seç ve oyuna başla!</p>
    <div class="level-grid" id="levels"></div>
</div>

<!-- 2. OYUN EKRANI -->
<div id="game-screen" class="container hidden">
    <button class="btn-close" onclick="endGame()">×</button>
    
    <div id="score-board" onclick="openInspectScreen()">
        <div class="main-stats">Skor: <span id="score">0</span> | Seviye: <span id="level-display">6</span><span id="level-suffix">'lar</span></div>
        <div class="sub-stats">
            <span class="stat-correct">✔ Doğru: <span id="correct-count">0</span></span>
            <span class="stat-divider">|</span>
            <span class="stat-wrong">✖ Yanlış: <span id="wrong-count">0</span></span>
        </div>
        <div class="btn-inspect">
            <span>🔍</span>
            İncele
        </div>
    </div>

    <!-- Üst Soru Metni -->
    <div class="question-text">Kaç nokta var <span class="red-qm">?</span></div>

    <div class="matrix-wrapper">
        <div class="matrix-container" id="matrix-box">
            <div id="dot-container"></div>
            
            <div class="bracket-right">
                <span id="row-label">-- tane</span>
            </div>
            
            <div class="bracket-bottom">
                <span id="col-label">-- tane</span>
            </div>
        </div>
    </div>
    
    <!-- Alt Soru Metni (İşlem) -->
    <div class="question-text bottom-equation">
        <span id="eq-mult"></span> x <span id="eq-level"></span> = <span class="red-qm">?</span>
    </div>
    
    <div class="options">
        <button id="opt1" class="btn-option" onclick="checkAnswer(this)"></button>
        <button id="opt2" class="btn-option" onclick="checkAnswer(this)"></button>
    </div>
    <p id="message"></p>
</div>

<!-- 3. İNCELEME (KARNE) EKRANI -->
<div id="inspect-screen" class="container hidden">
    <button class="btn-close" onclick="closeInspectScreen()">×</button>
    
    <div id="score-board" style="padding-right: 15px; cursor: default;">
        <div class="main-stats">Skor: <span id="insp-score">0</span></div>
        <div class="sub-stats">
            <span class="stat-correct">✔ Doğru: <span id="insp-correct">0</span></span>
            <span class="stat-divider">|</span>
            <span class="stat-wrong">✖ Yanlış: <span id="insp-wrong">0</span></span>
        </div>
    </div>

    <h2 style="color: #2c3e50; margin: 10px 0;"><span id="insp-level-title">6</span><span id="insp-level-suffix">'lar</span> Çarpım Tablosu</h2>
    
    <div id="table-list" class="table-list"></div>

    <button class="btn-mistakes" onclick="startMistakeMode()">Sadece Yanlışlara Çalış</button>
</div>

<script>
    let currentLevel = 1; 
    let currentMultiplier = 1; 
    let correctAnswerText = ""; 
    
    let score = 0;
    let correctCount = 0; 
    let wrongCount = 0;   
    let isClickable = true; 
    let historyData = {}; 

    let isMistakeMode = false;
    let mistakeQueue = [];
    let fixedMistakesThisSession = 0; 

    function showScreen(screenId) {
        document.getElementById('level-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.add('hidden');
        document.getElementById('inspect-screen').classList.add('hidden');
        document.getElementById(screenId).classList.remove('hidden');
    }

    function generateLevelButtons() {
        const levelsDiv = document.getElementById('levels');
        levelsDiv.innerHTML = ""; 
        for (let i = 1; i <= 9; i++) {
            let btn = document.createElement('button');
            btn.innerText = i;
            btn.className = "btn-level";
            btn.onclick = () => startLevel(i);
            levelsDiv.appendChild(btn);
        }
    }
    
    window.onload = generateLevelButtons;

    function startLevel(level) {
        currentLevel = level;
        document.getElementById('level-display').innerText = level;
        document.getElementById('insp-level-title').innerText = level;
        
        let suffix = [1, 2, 3, 4, 5, 7, 8].includes(level) ? "'ler" : "'lar";
        document.getElementById('level-suffix').innerText = suffix;
        document.getElementById('insp-level-suffix').innerText = suffix;

        score = 0;
        correctCount = 0; 
        wrongCount = 0;   
        historyData = {};
        isMistakeMode = false;
        mistakeQueue = [];

        updateScore();
        showScreen('game-screen');
        askQuestion();
    }

    function askQuestion() {
        isClickable = true;
        document.getElementById("message").innerText = "";
        
        const btn1 = document.getElementById("opt1");
        const btn2 = document.getElementById("opt2");
        btn1.className = "btn-option"; 
        btn2.className = "btn-option";

        if (isMistakeMode) {
            const randomIndex = Math.floor(Math.random() * mistakeQueue.length);
            currentMultiplier = mistakeQueue[randomIndex];
        } else {
            currentMultiplier = Math.floor(Math.random() * 10) + 1;
        }

        const targetResult = currentLevel * currentMultiplier;
        correctAnswerText = targetResult.toString();
        
        // Dinamik Soru Yazılarını Güncelleme
        document.getElementById('eq-mult').innerText = currentMultiplier;
        document.getElementById('eq-level').innerText = currentLevel;

        const dotContainer = document.getElementById("dot-container");
        dotContainer.innerHTML = ""; 
        
        dotContainer.style.gridTemplateColumns = `repeat(${currentLevel}, auto)`;
        
        for(let i = 0; i < targetResult; i++) {
            let dot = document.createElement('div');
            dot.className = "dot";
            dot.style.animationDelay = `${(i * 0.01)}s`; 
            dotContainer.appendChild(dot);
        }

        const rowLabel = document.getElementById("row-label");
        const colLabel = document.getElementById("col-label");
        
        rowLabel.style.animation = 'none';
        colLabel.style.animation = 'none';
        rowLabel.offsetHeight; 
        
        rowLabel.innerText = `${currentMultiplier} tane`;
        colLabel.innerText = `${currentLevel} tane`;
        
        rowLabel.style.animation = `fadeIn 0.5s ease-out ${(targetResult * 0.01) + 0.1}s forwards`;
        colLabel.style.animation = `fadeIn 0.5s ease-out ${(targetResult * 0.01) + 0.1}s forwards`;

        let fakeRows;
        if (currentMultiplier === 10) {
            fakeRows = 9;
        } else if (currentMultiplier === 1) {
            fakeRows = 2;
        } else {
            fakeRows = currentMultiplier + (Math.random() > 0.5 ? 1 : -1);
        }
        
        let fakeAnswerText = (currentLevel * fakeRows).toString();

        if (Math.random() > 0.5) {
            btn1.innerText = correctAnswerText; 
            btn2.innerText = fakeAnswerText;
        } else {
            btn1.innerText = fakeAnswerText; 
            btn2.innerText = correctAnswerText;
        }
    }

    function checkAnswer(btn) {
        if (!isClickable) return; 
        isClickable = false;

        if (btn.innerText === correctAnswerText) {
            btn.classList.add("correct");
            document.getElementById("message").innerText = "Tam İsabet! 🎯";
            document.getElementById("message").style.color = "#27ae60";
            score += 10;
            correctCount++; 
            updateScore();
            historyData[currentMultiplier] = 'correct';

            if (isMistakeMode) {
                mistakeQueue = mistakeQueue.filter(m => m !== currentMultiplier);
                fixedMistakesThisSession++; 
                
                if (mistakeQueue.length === 0) {
                    setTimeout(() => {
                        alert("Tebrikler! Tüm yanlışlarını öğrendin. 🎉");
                        isMistakeMode = false;
                        askQuestion();
                        openInspectScreen();
                    }, 1000);
                    return;
                }
            }
            setTimeout(askQuestion, 1200); 
        } else {
            btn.classList.add("wrong");
            document.getElementById("message").innerText = "Maalesef yanlış, tekrar dene!";
            document.getElementById("message").style.color = "#c0392b";
            wrongCount++; 
            updateScore();
            historyData[currentMultiplier] = 'wrong';

            setTimeout(askQuestion, 1800); 
        }
    }

    function updateScore() {
        document.getElementById('score').innerText = score;
        document.getElementById('correct-count').innerText = correctCount;
        document.getElementById('wrong-count').innerText = wrongCount;
    }

    function endGame() {
        if (isMistakeMode) {
            alert(`Tebrikler! ${fixedMistakesThisSession} tane yanlış düzelttiniz.\nKalan düzeltilmesi gereken yanlış sayısı: ${mistakeQueue.length}`);
            isMistakeMode = false;
            openInspectScreen(); 
        } else {
            if(confirm("Oyunu bitirmek ve seviye seçimine dönmek istiyor musun?")) {
                showScreen('level-screen'); 
            }
        }
    }

    function openInspectScreen() {
        showScreen('inspect-screen');
        
        document.getElementById('insp-score').innerText = score;
        document.getElementById('insp-correct').innerText = correctCount;
        document.getElementById('insp-wrong').innerText = wrongCount;

        const listDiv = document.getElementById('table-list');
        listDiv.innerHTML = "";

        let col1 = document.createElement('div');
        col1.className = "table-column";
        let col2 = document.createElement('div');
        col2.className = "table-column";

        for(let i = 1; i <= 10; i++) {
            let div = document.createElement('div');
            div.className = "table-row";
            
            let statusHTML = "";
            let rowClass = "row-unanswered";

            if (historyData[i] === 'correct') {
                statusHTML = "✔ ";
                rowClass = "row-correct";
            } else if (historyData[i] === 'wrong') {
                statusHTML = "✖ ";
                rowClass = "row-wrong";
            } else {
                statusHTML = "<span style='opacity:0;'>✔ </span>"; 
            }

            div.innerHTML = `<span class="${rowClass}">${statusHTML} ${currentLevel} x ${i} = ${currentLevel * i}</span>`;
            
            if (i <= 5) {
                col1.appendChild(div);
            } else {
                col2.appendChild(div);
            }
        }
        
        listDiv.appendChild(col1);
        listDiv.appendChild(col2);
    }

    function closeInspectScreen() {
        showScreen('game-screen');
    }

    function startMistakeMode() {
        mistakeQueue = [];
        for (let i = 1; i <= 10; i++) {
            if (historyData[i] === 'wrong') {
                mistakeQueue.push(i);
            }
        }

        if (mistakeQueue.length === 0) {
            alert("Harika! Hiç yanlışınız yok.");
            return;
        }

        fixedMistakesThisSession = 0; 
        isMistakeMode = true;
        showScreen('game-screen');
        askQuestion();
    }
</script>
</body>
</html>
